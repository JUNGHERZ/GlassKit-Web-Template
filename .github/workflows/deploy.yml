name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Zwei Builds, ein Artefakt: die statische Produkt-Landing-Page (site/) liegt
  # an der Domain-Wurzel, die LUMEN-Demo (Astro-Build, base=/demo/) daneben.
  # In abgeleiteten Projekten: den "Assemble"-Step entfernen (GlassKit-Web only)
  # und stattdessen dist/ direkt hochladen.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build demo with Astro
        run: npm run build
      - name: Assemble site (landing at /, demo at /demo/) # GlassKit-Web only
        run: |
          mkdir -p _site/demo
          cp -R site/. _site/
          cp -R dist/. _site/demo/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  # Playwright-Smoke-Test (tests/smoke.spec.ts): schlägt er fehl, wird nicht deployed.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
